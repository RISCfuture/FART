name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS ${{ matrix.ios-label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - ios-label: latest
            runner: macos-26
            device: "iPhone 17 Pro"
            device-type: com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro
            os-version: ""
            xcode-version: latest-stable
          - ios-label: "18.5"
            runner: macos-latest
            device: "iPhone 15 Pro"
            device-type: com.apple.CoreSimulator.SimDeviceType.iPhone-15-Pro
            os-version: "18.5"
            xcode-version: latest-stable
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Disable background services
        run: |
          sudo mdutil -a -i off
          sudo launchctl bootout system/com.apple.metadata.mds 2>/dev/null || true
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode-version }}
      - name: Ensure iOS simulator runtime
        run: |
          if [ -n "${{ matrix.os-version }}" ]; then
            if ! xcrun simctl list runtimes | grep -q "iOS ${{ matrix.os-version }}"; then
              echo "iOS ${{ matrix.os-version }} runtime not found, downloading..."
              xcodebuild -downloadPlatform iOS -buildVersion "${{ matrix.os-version }}"
            fi
          else
            SDK_VERSION=$(xcrun --sdk iphonesimulator --show-sdk-version)
            if ! xcrun simctl list runtimes | grep -q "iOS ${SDK_VERSION}"; then
              echo "iOS ${SDK_VERSION} runtime not found, downloading..."
              xcodebuild -downloadPlatform iOS
            fi
          fi
      - name: Create simulator
        id: sim
        run: |
          while xcrun simctl delete "${{ matrix.device }}" 2>/dev/null; do :; done
          if [ -n "${{ matrix.os-version }}" ]; then
            RUNTIME_ID="com.apple.CoreSimulator.SimRuntime.iOS-$(echo "${{ matrix.os-version }}" | tr '.' '-')"
            UDID=$(xcrun simctl create "${{ matrix.device }}" "${{ matrix.device-type }}" "$RUNTIME_ID")
          else
            UDID=$(xcrun simctl create "${{ matrix.device }}" "${{ matrix.device-type }}")
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Created simulator ${{ matrix.device }} ($UDID)"
      - uses: actions/checkout@v4
      - name: Enable macros
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -scheme "FART (iOS)" -testPlan "Unit Tests" \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -destination-timeout 300 \
            -derivedDataPath DerivedData \
            | xcbeautify --renderer github-actions
          xcodebuild build-for-testing \
            -scheme "FART (iOS)" -testPlan "UI Tests" \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -destination-timeout 300 \
            -derivedDataPath DerivedData \
            | xcbeautify --renderer github-actions
      - name: Clean build intermediates
        run: rm -rf DerivedData/Build/Intermediates.noindex
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: derived-data-${{ matrix.ios-label }}
          path: DerivedData
          retention-days: 1

  unit:
    name: Unit Tests (iOS ${{ matrix.ios-label }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - ios-label: latest
            runner: macos-26
            device: "iPhone 17 Pro"
            device-type: com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro
            os-version: ""
            xcode-version: latest-stable
          - ios-label: "18.5"
            runner: macos-latest
            device: "iPhone 15 Pro"
            device-type: com.apple.CoreSimulator.SimDeviceType.iPhone-15-Pro
            os-version: "18.5"
            xcode-version: latest-stable
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Disable background services
        run: |
          sudo mdutil -a -i off
          sudo launchctl bootout system/com.apple.metadata.mds 2>/dev/null || true
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode-version }}
      - name: Ensure iOS simulator runtime
        run: |
          if [ -n "${{ matrix.os-version }}" ]; then
            if ! xcrun simctl list runtimes | grep -q "iOS ${{ matrix.os-version }}"; then
              echo "iOS ${{ matrix.os-version }} runtime not found, downloading..."
              xcodebuild -downloadPlatform iOS -buildVersion "${{ matrix.os-version }}"
            fi
          else
            SDK_VERSION=$(xcrun --sdk iphonesimulator --show-sdk-version)
            if ! xcrun simctl list runtimes | grep -q "iOS ${SDK_VERSION}"; then
              echo "iOS ${SDK_VERSION} runtime not found, downloading..."
              xcodebuild -downloadPlatform iOS
            fi
          fi
      - name: Create simulator
        id: sim
        run: |
          while xcrun simctl delete "${{ matrix.device }}" 2>/dev/null; do :; done
          if [ -n "${{ matrix.os-version }}" ]; then
            RUNTIME_ID="com.apple.CoreSimulator.SimRuntime.iOS-$(echo "${{ matrix.os-version }}" | tr '.' '-')"
            UDID=$(xcrun simctl create "${{ matrix.device }}" "${{ matrix.device-type }}" "$RUNTIME_ID")
          else
            UDID=$(xcrun simctl create "${{ matrix.device }}" "${{ matrix.device-type }}")
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Created simulator ${{ matrix.device }} ($UDID)"
      - uses: actions/checkout@v4
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: derived-data-${{ matrix.ios-label }}
          path: DerivedData
      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -scheme "FART (iOS)" -testPlan "Unit Tests" \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -destination-timeout 300 \
            -derivedDataPath DerivedData \
            | xcbeautify --renderer github-actions

  ui:
    name: UI Tests (${{ matrix.device }}, iOS ${{ matrix.ios-label }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - ios-label: latest
            runner: macos-26
            device: "iPhone 17 Pro"
            device-type: com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro
            os-version: ""
            xcode-version: latest-stable
          - ios-label: latest
            runner: macos-26
            device: "iPad Pro 13-inch (M5)"
            device-type: com.apple.CoreSimulator.SimDeviceType.iPad-Pro-13-inch-M5-12GB
            os-version: ""
            xcode-version: latest-stable
          - ios-label: "18.5"
            runner: macos-latest
            device: "iPhone 15 Pro"
            device-type: com.apple.CoreSimulator.SimDeviceType.iPhone-15-Pro
            os-version: "18.5"
            xcode-version: latest-stable
          - ios-label: "18.5"
            runner: macos-latest
            device: "iPad Pro 12.9-inch (6th generation)"
            device-type: com.apple.CoreSimulator.SimDeviceType.iPad-Pro-12-9-inch-6th-generation-8GB
            os-version: "18.5"
            xcode-version: latest-stable
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Disable background services
        run: |
          sudo mdutil -a -i off
          sudo launchctl bootout system/com.apple.metadata.mds 2>/dev/null || true
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode-version }}
      - name: Ensure iOS simulator runtime
        run: |
          if [ -n "${{ matrix.os-version }}" ]; then
            if ! xcrun simctl list runtimes | grep -q "iOS ${{ matrix.os-version }}"; then
              echo "iOS ${{ matrix.os-version }} runtime not found, downloading..."
              xcodebuild -downloadPlatform iOS -buildVersion "${{ matrix.os-version }}"
            fi
          else
            SDK_VERSION=$(xcrun --sdk iphonesimulator --show-sdk-version)
            if ! xcrun simctl list runtimes | grep -q "iOS ${SDK_VERSION}"; then
              echo "iOS ${SDK_VERSION} runtime not found, downloading..."
              xcodebuild -downloadPlatform iOS
            fi
          fi
      - name: Create simulator
        id: sim
        run: |
          while xcrun simctl delete "${{ matrix.device }}" 2>/dev/null; do :; done
          if [ -n "${{ matrix.os-version }}" ]; then
            RUNTIME_ID="com.apple.CoreSimulator.SimRuntime.iOS-$(echo "${{ matrix.os-version }}" | tr '.' '-')"
            UDID=$(xcrun simctl create "${{ matrix.device }}" "${{ matrix.device-type }}" "$RUNTIME_ID")
          else
            UDID=$(xcrun simctl create "${{ matrix.device }}" "${{ matrix.device-type }}")
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Created simulator ${{ matrix.device }} ($UDID)"
      - name: Configure simulator
        run: |
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" || true
          xcrun simctl spawn "${{ steps.sim.outputs.udid }}" defaults write -g AppleLocale en_US
          xcrun simctl spawn "${{ steps.sim.outputs.udid }}" defaults write com.apple.Preferences KeyboardAutocorrection -bool false
          xcrun simctl spawn "${{ steps.sim.outputs.udid }}" defaults write com.apple.Preferences KeyboardAutocapitalization -bool false
          xcrun simctl spawn "${{ steps.sim.outputs.udid }}" defaults write com.apple.Preferences KeyboardPrediction -bool false
          defaults write com.apple.iphonesimulator ConnectHardwareKeyboard -bool NO
          xcrun simctl status_bar "${{ steps.sim.outputs.udid }}" override \
            --time "9:41" --dataNetwork wifi --wifiMode active --wifiBars 3 \
            --cellularMode active --cellularBars 4 --batteryState charged --batteryLevel 100 || true
      - uses: actions/checkout@v4
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: derived-data-${{ matrix.ios-label }}
          path: DerivedData
      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -scheme "FART (iOS)" -testPlan "UI Tests" \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -destination-timeout 300 \
            -derivedDataPath DerivedData \
            | xcbeautify --renderer github-actions
